<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="100%" height="100%">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a8deb" />
      <stop offset="100%" stop-color="#2b61b3" />
    </linearGradient>
    <linearGradient id="silverGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#9a9cae" />
    </linearGradient>
  </defs>

  <!-- Graphic Mark -->
  <g transform="translate(10, 15)">
    <!-- Die Casting Mold / Block Representation -->
    <path d="M 0,0 L 25,0 L 35,15 L 25,30 L 0,30 Z" fill="url(#blueGradient)" />
    <path d="M 30,0 L 55,0 L 55,30 L 30,30 L 40,15 Z" fill="url(#silverGradient)" />
    <!-- Flame / Burner inside -->
    <circle cx="27.5" cy="15" r="4" fill="#0a0a0c" />
  </g>

  <!-- Typography -->
  <text x="80" y="38" font-family="'Space Grotesk', system-ui, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="1">BDC</text>
  <text x="82" y="58" font-family="'Inter', system-ui, sans-serif" font-size="14" font-weight="600" fill="#4a8deb" letter-spacing="3.5">INDUSTRIES</text>
</svg>
